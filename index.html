<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>포스코퓨처엠 스마트 밀폐공간 안전설계 및 온열질환 예방 프로그램</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --posco-blue: #005BAC;
      --posco-navy: #003B70;
      --light-blue: #EAF4FF;
      --danger: #D93025;
      --warning: #F9AB00;
      --safe: #188038;
      --gray: #5f6368;
      --border: #DADCE0;
      --bg: #F6F8FB;
      --card: #FFFFFF;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
      background: var(--bg); color: #202124; line-height: 1.6;
      display: flex; flex-direction: column; min-height: 100vh;
      font-size: 18px; word-break: keep-all; overflow-wrap: break-word;
      -webkit-text-size-adjust: 100%;
      -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
    }

    #main-content { display: flex; flex-direction: column; flex: 1; }
    header { background: linear-gradient(135deg, var(--posco-navy), var(--posco-blue)); color: white; padding: 32px 20px; text-align: center; }
    header h1 { margin: 0; font-size: 28px; font-weight: 800; line-height: 1.4; }
    header p { margin: 8px 0 0 0; font-size: 16px; font-weight: 400; color: #EAF4FF; }
    .mobile-only { display: none; }
    .container { max-width: 1300px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 420px 1fr; gap: 24px; flex: 1; width: 100%; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 6px 18px rgba(0,0,0,0.06); overflow: hidden; }
    .card-title { padding: 20px 22px; background: var(--light-blue); color: var(--posco-navy); font-size: 20px; font-weight: 800; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .card-body { padding: 22px; }
    label { display: block; font-weight: 700; margin: 18px 0 8px; color: #2b2f33; font-size: 18px; }
    input, select, button { font-family: inherit; -webkit-appearance: none; appearance: none; border-radius: 12px; }
    input, select { width: 100%; padding: 14px 16px; border: 1px solid var(--border); font-size: 18px; outline: none; background: white; color: #202124; }
    select {
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23005BAC%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat; background-position: right 16px top 50%; background-size: 14px auto; padding-right: 40px;
    }
    input:focus, select:focus { border-color: var(--posco-blue); box-shadow: 0 0 0 3px rgba(0,91,172,0.12); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .hint { color: var(--gray); font-size: 15px; margin-top: 6px; }
    .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
    button { border: none; padding: 16px; font-weight: 800; cursor: pointer; font-size: 18px; }
    .btn-primary { background: var(--posco-blue); color: white; }
    .btn-secondary { background: #EEF1F4; color: #202124; }
    .btn-print { background: #188038; color: white; padding: 10px 16px; font-size: 15px; border-radius: 8px; }
    .greeting { padding: 22px; border-radius: 16px; background: linear-gradient(135deg, #F0F7FF, #FFFFFF); border: 1px solid #CFE6FF; margin-bottom: 20px; font-size: 18px; }
    .greeting strong { color: var(--posco-navy); font-size: 20px; }
    section.result-section { border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 18px; background: #FFFFFF; }
    section.result-section h2 { font-size: 22px; margin: 0 0 14px; color: var(--posco-navy); }
    .formula { background: #F8FAFD; border-left: 6px solid var(--posco-blue); padding: 16px 18px; border-radius: 10px; font-family: Consolas, "Courier New", monospace; white-space: pre-wrap; margin: 16px 0; color: #1f1f1f; font-size: 16px; }
    .kv { display: flex; justify-content: space-between; gap: 14px; padding: 12px 0; border-bottom: 1px dashed #E0E0E0; font-size: 18px; }
    .kv:last-child { border-bottom: none; }
    .kv span { color: #4b4f56; }
    .kv b { text-align: right; color: #111827; }
    .notice { padding: 16px 18px; border-radius: 12px; margin: 12px 0; font-weight: 700; font-size: 18px; }
    .notice.info { background: #EAF4FF; color: var(--posco-navy); border: 1px solid #CFE6FF; }
    .notice.warning { background: #FFF7E0; color: #8A5A00; border: 1px solid #FFE1A6; }
    .notice.safe { background: #E6F4EA; color: var(--safe); border: 1px solid #B7E1C1; }
    .notice.danger { background: #FCE8E6; color: var(--danger); border: 1px solid #F5C2BD; }
    ul { margin: 10px 0 0 24px; padding: 0; }
    li { margin-bottom: 8px; }
    .badge { display: inline-block; padding: 6px 12px; border-radius: 999px; background: var(--light-blue); color: var(--posco-navy); font-size: 15px; font-weight: 800; margin-left: 6px; vertical-align: middle; }
    .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 16px 0; border-radius: 8px; border: 1px solid var(--border); }
    .heat-table { width: 100%; min-width: 700px; border-collapse: collapse; font-size: 16px; text-align: center; margin: 0; }
    .heat-table th, .heat-table td { border: 1px solid var(--border); padding: 14px 10px; }
    .heat-table th { font-weight: 800; font-size: 18px; }
    .bg-yellow { background-color: #FFF2CC; color: #B45F06; }
    .bg-orange { background-color: #FCE5CD; color: #E69138; }
    .bg-red { background-color: #F4CCCC; color: #CC0000; }
    .bg-gray { background-color: #F3F3F3; font-weight: 700; }
    .nowrap { white-space: nowrap; }
    .tbm-box { background: #F8FAFD; border: 2px dashed var(--posco-blue); padding: 20px; border-radius: 12px; margin-top: 16px; }
    .tbm-box h3 { margin: 0 0 12px 0; color: var(--posco-blue); font-size: 20px; }
    .tbm-box p { margin: 8px 0; font-weight: 600; font-size: 18px; }
    .chant { color: var(--danger); font-size: 22px; font-weight: 800; text-align: center; margin-top: 16px; }

    /* 조회수 카운터 */
    .view-counter-wrap { text-align: center; padding: 16px 18px 0 18px; background: var(--bg); }
    .view-counter { display: inline-flex; align-items: center; background: white; border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); font-size: 16px; color: var(--posco-navy); }
    .view-counter span { margin: 0 8px; }
    .view-counter b { color: var(--posco-blue); font-size: 18px; }
    .view-counter .divider { color: #ccc; margin: 0; }

    .copyright { text-align: center; padding: 24px 18px; color: #80868b; font-size: 15px; font-weight: 500; background: var(--bg); }

    @media (max-width: 1000px) {
      .container { grid-template-columns: 1fr; padding: 16px; }
    }
    @media (max-width: 600px) {
      body { font-size: 16px; }
      header { padding: 24px 16px; }
      header h1 { font-size: 22px; }
      .mobile-only { display: block; }
      .card-title { font-size: 18px; flex-direction: column; align-items: flex-start; }
      .btn-print { width: 100%; text-align: center; padding: 12px; font-size: 16px; }
      .card-body { padding: 16px; }
      .row { grid-template-columns: 1fr; gap: 0; }
      label { font-size: 16px; margin: 14px 0 6px; }
      input, select, button { font-size: 16px; padding: 12px 14px; }
      section.result-section { padding: 16px; }
      section.result-section h2 { font-size: 18px; }
      .kv { font-size: 16px; flex-direction: column; gap: 4px; padding: 10px 0; }
      .kv b { text-align: left; color: var(--posco-blue); font-size: 18px; }
      .tbm-box h3 { font-size: 18px; }
      .tbm-box p { font-size: 16px; }
      .chant { font-size: 18px; }
      .view-counter { font-size: 14px; padding: 8px 14px; }
      .view-counter b { font-size: 16px; }
    }

    @media print {
      @page { size: A4; margin: 12mm; }
      header, .input-card, .btns, .btn-print, .copyright, .view-counter-wrap { display: none !important; }
      body { background: white; display: block; font-size: 12px; line-height: 1.35; color: #000; }
      .container { display: block; max-width: none; padding: 0; margin: 0; }
      .card { border: none; box-shadow: none; }
      .card-body { padding: 0; }
      .card-title { background: none !important; color: #003B70 !important; border-bottom: 2px solid #003B70 !important; font-size: 18px !important; font-weight: 800 !important; padding: 0 0 8px 0 !important; margin-bottom: 12px !important; display: block !important; text-align: center !important; }
      .greeting { padding: 10px 14px; margin-bottom: 12px; font-size: 12px; border-radius: 8px; background: #F4F8FC !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      section.result-section { break-inside: avoid; margin-bottom: 10px; padding: 10px 14px; border: 1px solid #DADCE0; border-radius: 10px; }
      section.result-section h2 { font-size: 13px; margin-bottom: 6px; }
      .formula { padding: 6px 10px; margin: 6px 0; font-size: 10.5px; border-left-width: 4px; background: #F8FAFD !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .kv { padding: 4px 0; font-size: 12px; }
      .kv b { font-size: 12px; }
      .notice { padding: 6px 10px; margin: 6px 0; font-size: 11.5px; border-radius: 6px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .notice.info { background: #EAF4FF !important; }
      .notice.warning { background: #FFF7E0 !important; }
      .notice.safe { background: #E6F4EA !important; }
      .notice.danger { background: #FCE8E6 !important; }
      ul { margin-top: 4px; margin-left: 16px; }
      li { margin-bottom: 3px; }
      .table-responsive { border: none; overflow: visible; margin: 8px 0; }
      .heat-table { min-width: 100%; font-size: 11px; }
      .heat-table th, .heat-table td { padding: 6px 4px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .heat-table th { font-size: 11.5px; }
      .bg-yellow { background-color: #FFF2CC !important; }
      .bg-orange { background-color: #FCE5CD !important; }
      .bg-red { background-color: #F4CCCC !important; }
      .bg-gray { background-color: #F3F3F3 !important; }
      .tbm-box { padding: 10px 14px; margin-top: 8px; border-width: 1px; background: #F8FAFD !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .tbm-box h3 { font-size: 12.5px; margin-bottom: 4px; }
      .tbm-box p { margin: 4px 0; font-size: 11.5px; }
      .chant { font-size: 13px; margin-top: 6px; }
    }
  </style>
</head>
<body>

  <!-- 🔓 메인 콘텐츠 -->
  <div id="main-content">
    <header>
      <h1>포스코퓨처엠 스마트 밀폐공간 안전설계 및<br class="mobile-only"> 온열질환 예방 프로그램</h1>
      <p>Smart Confined-space Safety Design &amp; Heat Stress Prevention Program</p>
    </header>

    <main class="container">
      <div class="card input-card">
        <div class="card-title">입력 정보</div>
        <div class="card-body">
          <label for="siteName">현장명</label>
          <input id="siteName" type="text" placeholder="예: 포항 00공장">

          <label for="shape">공간 형태</label>
          <select id="shape">
            <option value="rect">사각형</option>
            <option value="cyl">원통형</option>
            <option value="combined">결합형</option>
          </select>

          <div class="row">
            <div><label for="w">가로 W (m)</label><input id="w" type="number" min="0" step="0.01" placeholder="예: 3"></div>
            <div><label for="l">세로 L (m)</label><input id="l" type="number" min="0" step="0.01" placeholder="예: 5"></div>
          </div>
          <div class="row">
            <div><label for="h">높이 H (m)</label><input id="h" type="number" min="0" step="0.01" placeholder="예: 2.5"></div>
            <div><label for="d">직경 D (m)</label><input id="d" type="number" min="0" step="0.01" placeholder="원통형 경우 작성"></div>
          </div>
          <div class="hint">결합형은 사각 체적과 원통 체적을 합산합니다.</div>

          <!-- 환기팬 용량 및 대수 입력 -->
          <div class="row">
            <div>
              <label for="fanCapacity">환기팬 1대당 용량 (m³/min) <span style="font-size:15px; font-weight:normal; color:var(--gray);">(선택)</span></label>
              <input id="fanCapacity" type="number" min="0" step="0.1" placeholder="예: 200">
            </div>
            <div>
              <label for="fanCount">적용 환기팬 대수 (대)</label>
              <input id="fanCount" type="number" min="1" step="1" placeholder="예: 1 (미입력 시 1대)">
            </div>
          </div>

          <label for="workers">동시 작업자 수 (명)</label>
          <input id="workers" type="number" min="0" step="1" placeholder="예: 3">

          <div class="row">
            <div><label for="temp">내부 예상 기온 (℃)</label><input id="temp" type="number" step="0.1" placeholder="예: 33"></div>
            <div><label for="rh">내부 예상 습도 (%)</label><input id="rh" type="number" min="0" max="100" step="1" placeholder="예: 65"></div>
          </div>

          <label for="task">작업 내용</label>
          <input id="task" type="text" placeholder="예: 일반 점검, 용접, 축조, 도장">

          <div class="btns">
            <button class="btn-primary" onclick="calculate()">즉시 산출</button>
            <button class="btn-secondary" onclick="resetForm()">초기화</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <span id="print-title">스마트 밀폐공간 안전설계 결과서</span>
          <button class="btn-print" onclick="window.print()">결과 인쇄 / PDF 저장</button>
        </div>
        <div class="card-body">
          <div id="result"></div>
        </div>
      </div>
    </main>

    <!-- 📊 조회수 카운터 (Streamlit이 자동 치환) -->
    <div class="view-counter-wrap">
      <div class="view-counter">
        <span>📊 조회수</span>
        <span>Today <b id="todayCount">0</b></span>
        <span class="divider">|</span>
        <span>Total <b id="totalCount">0</b></span>
      </div>
    </div>

    <footer class="copyright">
      &copy; 2026 Posco Future M. All rights reserved.
    </footer>
  </div>
